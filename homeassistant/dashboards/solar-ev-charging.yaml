# Solar EV Charging Dashboard
# Setup: Settings > Dashboards > Add Dashboard > select "Use YAML"
#        set filename to dashboards/solar-ev-charging.yaml

title: EV
views:
  # ==========================================================================
  # Main View: Overview
  # ==========================================================================
  - title: Overview
    path: overview
    icon: mdi:solar-power
    type: sidebar
    cards:
      # --- Power Flow (real-time with Tesla Model 3) ---
      - type: custom:power-flow-card-plus
        title: Power Flow
        entities:
          solar:
            entity: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
            display_zero_state: true
          grid:
            entity: sensor.smart_meter_power
            color:
              consumption:
                - 100
                - 180
                - 255
              production:
                - 180
                - 130
                - 255
          battery:
            entity: sensor.ep_cube_battery_power_display
            state_of_charge: sensor.ep_cube_remaining_stored_electricity_3
          home:
            entity: sensor.home_consumption_power
            override_state: true
            name: 家
          individual:
            - entity: sensor.tesla_charging_power_w
              name: Tesla
              icon: mdi:car-electric
              display_zero: true
              secondary_info:
                entity: sensor.tesla_ble_charge_level
                unit_of_measurement: "%"
                unit_white_space: false
                decimals: 0
                display_zero: false
        w_decimals: 1

      # --- Energy Flow (daily kWh) ---
      - type: custom:energy-flow-card-plus
        title: Energy Flow
        energy_date_selection: true
        dashboard_link: ""
        entities:
          solar:
            entity: sensor.ep_cube_measured_cumulative_amount_of_electric_energy_generated
            name: 太阳能
            icon: mdi:solar-power
            display_zero_state: true
          grid:
            entity:
              consumption: sensor.smart_meter_cumulative_buy
              production: sensor.smart_meter_cumulative_sell
          battery:
            entity:
              consumption: sensor.ep_cube_ac_measured_cumulative_discharging_electric_energy
              production: sensor.ep_cube_ac_measured_cumulative_charging_electric_energy
            state_of_charge: sensor.ep_cube_remaining_stored_electricity_3
          home:
            override_state: true
          individual1:
            entity: sensor.tesla_ev_charging_energy
            name: Tesla
            icon: mdi:car-electric
            display_zero: true
            display_zero_state: true
            secondary_info:
              entity: sensor.tesla_battery_energy
              decimals: 1
              display_zero: false
        wh_decimals: 1
        kwh_decimals: 1

      - type: energy-date-selection

      # --- Solar Charging Control (sidebar) ---
      - type: entities
        title: Solar Charging Control
        view_layout:
          position: sidebar
        entities:
          - entity: input_boolean.solar_charging_enabled
            name: Solar Charging
          - entity: binary_sensor.solar_surplus_charging_available
            name: Surplus Available
          - entity: sensor.solar_surplus_power
            name: Surplus Power
          - entity: sensor.solar_total_available_power
            name: Total Available
          - entity: sensor.available_charging_amps
            name: Available Amps

      # --- Power Limit Control (sidebar) ---
      - type: entities
        title: Power Limit
        view_layout:
          position: sidebar
        entities:
          - entity: input_boolean.power_limit_enabled
            name: Power Limit
          - entity: input_number.power_limit_watts
            name: Limit (W)
          - entity: sensor.power_limit_amps
            name: Limit Amps
          - entity: sensor.effective_target_amps
            name: Effective Target

      # --- Tesla Vehicle Status (sidebar) ---
      - type: entities
        title: Tesla Model 3
        view_layout:
          position: sidebar
        entities:
          - entity: sensor.tesla_ble_charge_level
            name: Battery Level
          - entity: sensor.tesla_ble_charging_state
            name: Charging State
          - entity: binary_sensor.tesla_ble_charge_flap
            name: Plugged In
          - entity: sensor.tesla_actual_charging_current
            name: Charging Current (A)
          - entity: sensor.tesla_ble_charge_power
            name: Charging Power (kW)
          - entity: number.tesla_ble_charging_amps
            name: Set Charging Amps
          - entity: number.tesla_ble_charging_limit
            name: Charge Limit
          - entity: switch.tesla_ble_charger
            name: Charging Switch


  # ==========================================================================
  # History View: Graphs
  # ==========================================================================
  - title: History
    path: history
    icon: mdi:chart-line
    type: panel
    cards:
      - type: vertical-stack
        card_mod:
          style: |
            #root {
              padding: 8px;
            }
        cards:
          # --- Date Picker ---
          - type: horizontal-stack
            cards:
              - type: button
                name: 前日
                icon: mdi:chevron-left
                tap_action:
                  action: perform-action
                  perform_action: script.history_date_prev
                show_state: false
              - type: custom:config-template-card
                variables:
                  - >-
                    (function() {
                      var p = states['input_datetime.history_date'].state.split('-');
                      return parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
                    })()
                entities:
                  - input_datetime.history_date
                card:
                  type: button
                  entity: input_datetime.history_date
                  name: ${vars[0]}
                  icon: mdi:calendar
                  tap_action:
                    action: more-info
                  show_name: true
                  show_icon: true
                  show_state: false
              - type: button
                name: 翌日
                icon: mdi:chevron-right
                tap_action:
                  action: perform-action
                  perform_action: script.history_date_next
                show_state: false
              - type: button
                name: 今日
                icon: mdi:calendar-today
                tap_action:
                  action: perform-action
                  perform_action: script.history_date_today
                show_state: false

          # --- Power History ---
          - type: custom:config-template-card
            variables:
              - states['input_datetime.history_date'].state
              - >-
                (function() {
                  var p = states['input_datetime.history_date'].state.split('-');
                  var sel = new Date(p[0], p[1] - 1, p[2]);
                  var now = new Date();
                  now.setHours(0,0,0,0);
                  var diff = Math.round((sel - now) / 86400000);
                  if (diff === 0) return '+0d';
                  return (diff > 0 ? '+' : '') + diff + 'd';
                })()
            entities:
              - input_datetime.history_date
            card:
              type: custom:apexcharts-card
              header:
                title: >-
                  ${'Power Flow (' + vars[0] + ')'}
                show: true
              graph_span: 24h
              span:
                start: day
                offset: ${vars[1]}
              apex_config:
                chart:
                  height: 280
                  zoom:
                    enabled: true
                    type: x
                  toolbar:
                    show: true
                legend:
                  show: true
                stroke:
                  width: 1
                fill:
                  opacity: 0.4
                grid:
                  borderColor: '#444'
                  strokeDashArray: 0
                  xaxis:
                    lines:
                      show: true
                  yaxis:
                    lines:
                      show: true
                tooltip:
                  shared: true
                  intersect: false
                  x:
                    format: "HH:mm"
              all_series_config:
                type: area
                curve: smooth
                stroke_width: 1
                extend_to: now
                group_by:
                  func: avg
                  duration: 5min
                show:
                  legend_value: false
              series:
                - entity: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
                  name: Solar
                  color: '#ff9800'
                - entity: sensor.home_consumption_power
                  name: Home
                  color: '#e1e1e1'
                - entity: sensor.tesla_charging_power_w
                  name: EV Charging
                  color: '#e03030'
                  curve: stepline
                - entity: sensor.smart_meter_power
                  name: Grid
                  color: '#488fc2'

          # --- Battery Levels ---
          - type: custom:config-template-card
            variables:
              - states['input_datetime.history_date'].state
              - >-
                (function() {
                  var p = states['input_datetime.history_date'].state.split('-');
                  var sel = new Date(p[0], p[1] - 1, p[2]);
                  var now = new Date();
                  now.setHours(0,0,0,0);
                  var diff = Math.round((sel - now) / 86400000);
                  if (diff === 0) return '+0d';
                  return (diff > 0 ? '+' : '') + diff + 'd';
                })()
            entities:
              - input_datetime.history_date
            card:
              type: custom:apexcharts-card
              header:
                title: >-
                  ${'Battery Levels (' + vars[0] + ')'}
                show: true
              graph_span: 24h
              span:
                start: day
                offset: ${vars[1]}
              apex_config:
                chart:
                  height: 200
                  zoom:
                    enabled: true
                    type: x
                  toolbar:
                    show: true
                legend:
                  show: true
                stroke:
                  curve: smooth
                  width: 1
                fill:
                  opacity: 0.4
                grid:
                  borderColor: '#444'
                  strokeDashArray: 0
                  xaxis:
                    lines:
                      show: true
                  yaxis:
                    lines:
                      show: true
                tooltip:
                  shared: true
                  intersect: false
                  x:
                    format: "HH:mm"
              yaxis:
                - min: 0
                  max: 100
              all_series_config:
                type: area
                curve: smooth
                stroke_width: 1
                extend_to: now
                group_by:
                  func: avg
                  duration: 5min
                show:
                  legend_value: false
              series:
                - entity: sensor.ep_cube_remaining_stored_electricity_3
                  name: EP Cube
                  color: '#4db6ac'
                - entity: sensor.tesla_ble_charge_level
                  name: Tesla
                  color: '#e03030'
            title: Device Total

  # ==========================================================================
  # System View: Diagnostics
  # ==========================================================================
  - title: System
    path: system
    icon: mdi:cog
    cards:
      - type: entities
        title: ESP32 Diagnostics
        entities:
          - entity: sensor.tesla_ble_wifi_signal
            name: WiFi Signal
          - entity: sensor.tesla_ble_uptime
            name: Uptime
          - entity: binary_sensor.tesla_ble_asleep
            name: Vehicle Asleep
          - entity: binary_sensor.tesla_ble_user_presence
            name: User Present
          - entity: sensor.tesla_ble_ble_signal
            name: BLE Signal
          - entity: sensor.tesla_ble_ip_address
            name: IP Address

      - type: entities
        title: Charging Timers
        entities:
          - entity: timer.solar_enable_delay
            name: Enable Delay (1min)
          - entity: timer.solar_disable_delay
            name: Disable Delay (3min)
          - entity: timer.solar_guard
            name: Guard (5min)
          - entity: timer.solar_stabilize
            name: Stabilize (90s)

      - type: entities
        title: Automations
        entities:
          - entity: automation.solar_surplus_adjust_charging_amps
          - entity: automation.solar_surplus_start_charging_enable_delay_expired
          - entity: automation.solar_surplus_stop_charging_disable_delay_expired
          - entity: automation.solar_surplus_stop_on_low_solar_production
          - entity: automation.solar_surplus_stop_on_grid_import
          - entity: automation.solar_surplus_charging_complete
          - entity: automation.solar_surplus_manual_disable
          - entity: automation.solar_surplus_cable_plugged_guard

# Home Assistant - Portainer Stack on Synology NAS
# Deploy: Portainer > Stacks > Add Stack > paste this YAML
#
# Port 8123 will be available at http://<NAS_IP>:8123

services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - /volume1/docker/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Tokyo

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome
    restart: unless-stopped
    network_mode: host
    volumes:
      - /volume1/docker/esphome/config:/config

  matter-server:
    container_name: matter-server
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    restart: unless-stopped
    network_mode: host
    volumes:
      - /volume1/docker/matter-server:/data
    environment:
      - TZ=Asia/Tokyo

# Solar EV Charging Dashboard
# Setup: Settings > Dashboards > Add Dashboard > select "Use YAML"
#        set filename to dashboards/solar-ev-charging.yaml

title: EV
views:
  # ==========================================================================
  # Main View: Overview
  # ==========================================================================
  - title: Overview
    path: overview
    icon: mdi:solar-power
    type: sidebar
    cards:
      # --- Power Flow (real-time with Tesla Model 3) ---
      - type: custom:power-flow-card-plus
        title: Power Flow
        entities:
          solar:
            entity: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
            display_zero_state: true
          grid:
            entity: sensor.nature_remo_sumatometa_current_power
            color:
              consumption:
                - 100
                - 180
                - 255
              production:
                - 180
                - 130
                - 255
          battery:
            entity: sensor.ep_cube_battery_power_display
            state_of_charge: sensor.ep_cube_remaining_stored_electricity_3
          home:
            entity: sensor.home_consumption_power
            override_state: true
            name: 家
          individual:
            - entity: sensor.tesla_charging_power_w
              name: Tesla
              icon: mdi:car-electric
              display_zero: true
              secondary_info:
                entity: sensor.tesla_ble_charge_level
                unit_of_measurement: "%"
                unit_white_space: false
                decimals: 0
                display_zero: false
        w_decimals: 1

      # --- Energy Flow (daily kWh) ---
      - type: custom:energy-flow-card-plus
        title: Energy Flow
        energy_date_selection: true
        dashboard_link: ""
        entities:
          solar:
            entity: sensor.ep_cube_measured_cumulative_amount_of_electric_energy_generated
            name: 太阳能
            icon: mdi:solar-power
            display_zero_state: true
          grid:
            entity:
              consumption: sensor.nature_remo_sumatometa_buy_power
              production: sensor.nature_remo_sumatometa_sold_power
          battery:
            entity:
              consumption: sensor.ep_cube_ac_measured_cumulative_discharging_electric_energy
              production: sensor.ep_cube_ac_measured_cumulative_charging_electric_energy
            state_of_charge: sensor.ep_cube_remaining_stored_electricity_3
          home:
            override_state: true
          individual1:
            entity: sensor.tesla_ev_charging_energy
            name: Tesla
            icon: mdi:car-electric
            display_zero: true
            display_zero_state: true
            secondary_info:
              entity: sensor.tesla_ble_charge_level
              unit_of_measurement: "%"
              decimals: 0
        wh_decimals: 1
        kwh_decimals: 1

      - type: energy-date-selection

      # --- Solar Charging Control (sidebar) ---
      - type: entities
        title: Solar Charging Control
        view_layout:
          position: sidebar
        entities:
          - entity: input_boolean.solar_charging_enabled
            name: Solar Charging
          - entity: binary_sensor.solar_surplus_charging_available
            name: Surplus Available
          - entity: sensor.solar_surplus_power
            name: Surplus Power
          - entity: sensor.solar_total_available_power
            name: Total Available
          - entity: sensor.available_charging_amps
            name: Available Amps

      # --- Tesla Vehicle Status (sidebar) ---
      - type: entities
        title: Tesla Model 3
        view_layout:
          position: sidebar
        entities:
          - entity: sensor.tesla_ble_charge_level
            name: Battery Level
          - entity: sensor.tesla_ble_charging_state
            name: Charging State
          - entity: binary_sensor.tesla_ble_charge_flap
            name: Plugged In
          - entity: sensor.tesla_actual_charging_current
            name: Charging Current (A)
          - entity: sensor.tesla_ble_charge_power
            name: Charging Power (kW)
          - entity: number.tesla_ble_charging_amps
            name: Set Charging Amps
          - entity: number.tesla_ble_charging_limit
            name: Charge Limit
          - entity: switch.tesla_ble_charger
            name: Charging Switch


  # ==========================================================================
  # History View: Graphs
  # ==========================================================================
  - title: History
    path: history
    icon: mdi:chart-line
    cards:
      # --- Power History (today) ---
      - type: history-graph
        title: Power Flow (Today)
        hours_to_show: 24
        entities:
          - entity: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
            name: Solar
          - entity: sensor.solar_surplus_power
            name: Surplus
          - entity: sensor.solar_total_available_power
            name: Total Available
          - entity: sensor.tesla_charging_power_w
            name: EV Charging
          - entity: sensor.nature_remo_sumatometa_current_power
            name: Grid

      # --- Battery Levels ---
      - type: history-graph
        title: Battery Levels
        hours_to_show: 24
        entities:
          - entity: sensor.tesla_ble_charge_level
            name: Tesla Battery
          - entity: sensor.ep_cube_remaining_stored_electricity_3
            name: EP Cube Battery

      # --- Charging Current ---
      - type: history-graph
        title: Charging Current
        hours_to_show: 24
        entities:
          - entity: sensor.tesla_actual_charging_current
            name: Actual Current
          - entity: sensor.available_charging_amps
            name: Available Amps

      # --- Device Energy Usage ---
      - type: energy-date-selection
      - type: energy-devices-detail-graph
        title: Device Detail
      - type: energy-devices-graph
        title: Device Total

  # ==========================================================================
  # System View: Diagnostics
  # ==========================================================================
  - title: System
    path: system
    icon: mdi:cog
    cards:
      - type: entities
        title: ESP32 Diagnostics
        entities:
          - entity: sensor.tesla_ble_wifi_signal
            name: WiFi Signal
          - entity: sensor.tesla_ble_uptime
            name: Uptime
          - entity: binary_sensor.tesla_ble_asleep
            name: Vehicle Asleep
          - entity: binary_sensor.tesla_ble_user_presence
            name: User Present
          - entity: sensor.tesla_ble_ble_signal
            name: BLE Signal
          - entity: sensor.tesla_ble_ip_address
            name: IP Address

      - type: entities
        title: Charging Timers
        entities:
          - entity: timer.solar_enable_delay
            name: Enable Delay (1min)
          - entity: timer.solar_disable_delay
            name: Disable Delay (3min)
          - entity: timer.solar_guard
            name: Guard (5min)
          - entity: timer.solar_stabilize
            name: Stabilize (90s)

      - type: entities
        title: Automations
        entities:
          - entity: automation.solar_surplus_adjust_charging_amps
          - entity: automation.solar_surplus_start_charging_enable_delay_expired
          - entity: automation.solar_surplus_stop_charging_disable_delay_expired
          - entity: automation.solar_surplus_stop_on_low_solar_production
          - entity: automation.solar_surplus_stop_on_grid_import
          - entity: automation.solar_surplus_charging_complete
          - entity: automation.solar_surplus_manual_disable
          - entity: automation.solar_surplus_cable_plugged_guard

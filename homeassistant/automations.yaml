# Solar Surplus EV Charging Automations
#
# Algorithm: "Adjust amps frequently, ON/OFF carefully"
#
# Control flow:
#   surplus >= 1200W for 1min → Start at 5A (enable delay)
#   solarpower < 800W for 3min → Stop (disable delay)
#   Guard timer: 5min minimum between ON/OFF transitions
#   Stabilize timer: 45s after amp change, 1min after start
#   Cable plugged in + solar mode ON → charger OFF (wait for surplus)
#   Emergency: surplus < -500W for 2min → immediate stop
#
# Key concept: Hybrid approach
#   Start: surplus (grid-based) — accurate real excess measurement
#   Stop/adjust: solarpower — avoids EP Cube battery compensation masking deficit

# =============================================================================
# Main Control Loop: Adjust charging amps based on surplus power (every 30s)
# =============================================================================
- id: solar_surplus_adjust_charging
  alias: "Solar Surplus - Adjust Charging Amps"
  mode: single
  trigger:
    - platform: time_pattern
      seconds: "/30"
  condition:
    - condition: state
      entity_id: input_boolean.solar_charging_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.tesla_ble_charge_flap
      state: "on"
    - condition: template
      value_template: >
        {{ states('sensor.tesla_ble_charge_level') | float(100)
           < states('number.tesla_ble_charging_limit') | float(80) }}
    # Skip if Wi-SUN smart meter is stale (>5min old)
    - condition: template
      value_template: >
        {{ (now() | as_timestamp | int)
           - (states.sensor.smart_meter_power.last_updated | as_timestamp | int) < 300 }}
    # Skip if any EP Cube sensor is unavailable (ECHONET Lite communication lost)
    - condition: template
      value_template: >
        {% set ep_sensors = [
          states.sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated,
          states.sensor.ep_cube_measured_instantaneous_charging_discharging_electric_energy,
          states.sensor.ep_cube_remaining_stored_electricity_3
        ] %}
        {{ ep_sensors | map(attribute='state')
           | select('eq', 'unavailable') | list | length == 0 }}
    # Skip if stabilize timer active (just changed amps)
    - condition: template
      value_template: "{{ is_state('timer.solar_stabilize', 'idle') }}"
  action:
    - variables:
        surplus: "{{ states('sensor.solar_surplus_power') | float(0) }}"
        solarpower: "{{ states('sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated') | float(0) }}"
        is_charging: "{{ is_state('switch.tesla_ble_charger', 'on') }}"
        current_amps: "{{ states('number.tesla_ble_charging_amps') | int(0) }}"
        voltage: 200
        base_load: 400
        power_limit_amps: "{{ states('sensor.power_limit_amps') | int(24) }}"
        power_limit_enabled: "{{ is_state('input_boolean.power_limit_enabled', 'on') }}"
        solar_target: "{{ [[((surplus + current_amps * voltage - base_load) / voltage) | int, 5] | max, 24] | min }}"
        target: "{{ [[solar_target | int, power_limit_amps] | min, 5] | max }}"
    - choose:
        # === CHARGING: Adjust amps or prepare to stop ===
        - conditions:
            - condition: template
              value_template: "{{ is_charging }}"
          sequence:
            - choose:
                # POWER LIMIT: Even 5A exceeds limit → reduce to 5A and start disable delay
                - conditions:
                    - condition: template
                      value_template: "{{ power_limit_enabled and power_limit_amps < 5 }}"
                  sequence:
                    # Immediately reduce to minimum 5A
                    - if:
                        - condition: template
                          value_template: "{{ current_amps > 5 }}"
                      then:
                        - service: number.set_value
                          target:
                            entity_id: number.tesla_ble_charging_amps
                          data:
                            value: 5
                        - service: timer.start
                          target:
                            entity_id: timer.solar_stabilize
                          data:
                            duration: "00:00:45"
                        - service: system_log.write
                          data:
                            message: >
                              Solar charging POWER LIMIT REDUCE: {{ current_amps }}A → 5A
                              (power_limit_amps={{ power_limit_amps }}, home_consumption={{ states('sensor.home_consumption_power') }}W)
                            level: warning
                    # Start disable delay (even 5A exceeds limit)
                    - if:
                        - condition: state
                          entity_id: timer.solar_disable_delay
                          state: "idle"
                      then:
                        - service: timer.start
                          target:
                            entity_id: timer.solar_disable_delay
                        - service: system_log.write
                          data:
                            message: >
                              Solar charging POWER LIMIT: disable delay started
                              (power_limit_amps={{ power_limit_amps }}, home_consumption={{ states('sensor.home_consumption_power') }}W)
                            level: warning

                # REDUCE: solar can't cover current charging + base load
                - conditions:
                    - condition: template
                      value_template: "{{ solarpower < (current_amps * voltage + base_load) and current_amps > 5 }}"
                  sequence:
                    - service: number.set_value
                      target:
                        entity_id: number.tesla_ble_charging_amps
                      data:
                        value: "{{ target }}"
                    - service: timer.start
                      target:
                        entity_id: timer.solar_stabilize
                      data:
                        duration: "00:00:45"
                    - service: system_log.write
                      data:
                        message: "Solar charging REDUCE: {{ current_amps }}A → {{ target }}A (solarpower={{ solarpower }}W)"
                        level: info

                # LOW SOLAR: Start disable delay timer
                # Direct solar check (catches battery compensation by EP Cube)
                - conditions:
                    - condition: template
                      value_template: >
                        {{ states('sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated') | float(0) < 800 }}
                  sequence:
                    - if:
                        - condition: state
                          entity_id: timer.solar_disable_delay
                          state: "idle"
                      then:
                        - service: timer.start
                          target:
                            entity_id: timer.solar_disable_delay
                        - service: system_log.write
                          data:
                            message: "Solar charging disable delay started (solarpower={{ solarpower }}W)"
                            level: info

              # DEFAULT: Sufficient surplus, cancel disable timer and adjust amps
              default:
                # Cancel disable timer if running (surplus recovered)
                - if:
                    - condition: template
                      value_template: "{{ not is_state('timer.solar_disable_delay', 'idle') }}"
                  then:
                    - service: timer.cancel
                      target:
                        entity_id: timer.solar_disable_delay
                    - service: system_log.write
                      data:
                        message: "Solar charging disable delay cancelled (solarpower={{ solarpower }}W)"
                        level: info
                # Ramp UP: jump straight to target
                - if:
                    - condition: template
                      value_template: "{{ target | int > current_amps }}"
                  then:
                    - service: number.set_value
                      target:
                        entity_id: number.tesla_ble_charging_amps
                      data:
                        value: "{{ target }}"
                    - service: timer.start
                      target:
                        entity_id: timer.solar_stabilize
                      data:
                        duration: "00:00:45"
                    - service: system_log.write
                      data:
                        message: "Solar charging RAMP UP: {{ current_amps }}A → {{ target }}A (solarpower={{ solarpower }}W)"
                        level: info
                # Ramp DOWN: only if diff >= 3A (deadband)
                - if:
                    - condition: template
                      value_template: >
                        {{ current_amps - (target | int) >= 3
                           or (power_limit_enabled and power_limit_amps < solar_target | int and current_amps > target | int) }}
                  then:
                    - service: number.set_value
                      target:
                        entity_id: number.tesla_ble_charging_amps
                      data:
                        value: "{{ target }}"
                    - service: timer.start
                      target:
                        entity_id: timer.solar_stabilize
                      data:
                        duration: "00:00:45"
                    - service: system_log.write
                      data:
                        message: "Solar charging RAMP DOWN: {{ current_amps }}A → {{ target }}A (solarpower={{ solarpower }}W)"
                        level: info

        # === NOT CHARGING: Check if we should start ===
        - conditions:
            - condition: template
              value_template: "{{ not is_charging }}"
          sequence:
            - choose:
                # Surplus high enough to consider starting (grid exporting >= 1200W)
                - conditions:
                    - condition: template
                      value_template: "{{ surplus >= 1200 }}"
                    # Guard must be idle to start charging
                    - condition: state
                      entity_id: timer.solar_guard
                      state: "idle"
                  sequence:
                    - if:
                        - condition: state
                          entity_id: timer.solar_enable_delay
                          state: "idle"
                      then:
                        - service: timer.start
                          target:
                            entity_id: timer.solar_enable_delay
                        - service: system_log.write
                          data:
                            message: "Solar charging enable delay started (surplus={{ surplus }}W)"
                            level: info
              # Surplus dropped below threshold, cancel enable timer
              default:
                - if:
                    - condition: template
                      value_template: "{{ not is_state('timer.solar_enable_delay', 'idle') }}"
                  then:
                    - service: timer.cancel
                      target:
                        entity_id: timer.solar_enable_delay
                    - service: system_log.write
                      data:
                        message: "Solar charging enable delay cancelled (surplus={{ surplus }}W)"
                        level: info

# =============================================================================
# Enable Delay Expired: Start charging at 5A
# =============================================================================
- id: solar_surplus_start_charging
  alias: "Solar Surplus - Start Charging (Enable Delay Expired)"
  mode: single
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.solar_enable_delay
  condition:
    - condition: state
      entity_id: input_boolean.solar_charging_enabled
      state: "on"
    - condition: state
      entity_id: binary_sensor.tesla_ble_charge_flap
      state: "on"
    - condition: template
      value_template: >
        {{ states('sensor.tesla_ble_charge_level') | float(100)
           < states('number.tesla_ble_charging_limit') | float(80) }}
    # Re-check surplus is still sufficient
    - condition: numeric_state
      entity_id: sensor.solar_surplus_power
      above: 1000
    # Guard must be idle
    - condition: state
      entity_id: timer.solar_guard
      state: "idle"
    # Power limit must allow at least 5A
    - condition: template
      value_template: >
        {{ is_state('input_boolean.power_limit_enabled', 'off')
           or states('sensor.power_limit_amps') | int(24) >= 5 }}
  action:
    - service: number.set_value
      target:
        entity_id: number.tesla_ble_charging_amps
      data:
        value: 5
    - delay:
        seconds: 2
    - service: timer.start
      target:
        entity_id: timer.solar_guard
    - service: switch.turn_on
      target:
        entity_id: switch.tesla_ble_charger
    - service: timer.start
      target:
        entity_id: timer.solar_stabilize
      data:
        duration: "00:01:00"
    - service: system_log.write
      data:
        message: >
          Solar charging STARTED at 5A
          (surplus={{ states('sensor.solar_surplus_power') }}W)
        level: info

# =============================================================================
# Disable Delay Expired: Stop charging
# =============================================================================
- id: solar_surplus_stop_charging
  alias: "Solar Surplus - Stop Charging (Disable Delay Expired)"
  mode: single
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.solar_disable_delay
  condition:
    - condition: state
      entity_id: switch.tesla_ble_charger
      state: "on"
    # Guard must be idle
    - condition: state
      entity_id: timer.solar_guard
      state: "idle"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.tesla_ble_charger
    - service: timer.start
      target:
        entity_id: timer.solar_guard
    - service: timer.cancel
      target:
        entity_id: timer.solar_stabilize
    - service: system_log.write
      data:
        message: >
          Solar charging STOPPED (disable delay expired,
          total_available={{ states('sensor.solar_total_available_power') }}W)
        level: info

# =============================================================================
# Safety: Stop when solar production too low (catches battery compensation)
# =============================================================================
- id: solar_surplus_stop_on_low_solar
  alias: "Solar Surplus - Stop on Low Solar Production"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
      below: 800
      for:
        minutes: 3
  condition:
    - condition: state
      entity_id: switch.tesla_ble_charger
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.tesla_ble_charger
    - service: timer.start
      target:
        entity_id: timer.solar_guard
    - service: timer.cancel
      target:
        entity_id: timer.solar_enable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_disable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_stabilize
    - service: system_log.write
      data:
        message: >
          Solar charging STOPPED - low solar production
          (solarpower={{ states('sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated') }}W < 800W for 3min)
        level: warning

# =============================================================================
# Safety: Emergency stop when grid import exceeds threshold
# =============================================================================
- id: solar_surplus_stop_on_grid_import
  alias: "Solar Surplus - Emergency Stop on Grid Import"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.solar_surplus_power
      below: -500
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: switch.tesla_ble_charger
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.tesla_ble_charger
    - service: timer.start
      target:
        entity_id: timer.solar_guard
    - service: timer.cancel
      target:
        entity_id: timer.solar_enable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_disable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_stabilize
    - service: persistent_notification.create
      data:
        title: "Solar Charging Emergency Stop"
        message: >
          Grid import exceeded 500W for 2 minutes.
          Surplus: {{ states('sensor.solar_surplus_power') }}W
    - service: system_log.write
      data:
        message: >
          Solar charging EMERGENCY STOP
          (surplus={{ states('sensor.solar_surplus_power') }}W for 2min)
        level: warning

# =============================================================================
# Notification: Charging complete
# =============================================================================
- id: solar_surplus_charging_complete
  alias: "Solar Surplus - Charging Complete"
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.tesla_ble_charging_state
      to: "Complete"
  action:
    - service: timer.cancel
      target:
        entity_id: timer.solar_enable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_disable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_stabilize
    - service: persistent_notification.create
      data:
        title: "Tesla Charging Complete"
        message: "Battery: {{ states('sensor.tesla_ble_charge_level') }}%"

# =============================================================================
# Manual override: Stop charging when solar charging is disabled
# =============================================================================
- id: solar_surplus_manual_disable
  alias: "Solar Surplus - Manual Disable"
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.solar_charging_enabled
      to: "off"
  action:
    - if:
        - condition: state
          entity_id: switch.tesla_ble_charger
          state: "on"
      then:
        - service: switch.turn_off
          target:
            entity_id: switch.tesla_ble_charger
    - service: timer.cancel
      target:
        entity_id: timer.solar_enable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_disable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_guard
    - service: timer.cancel
      target:
        entity_id: timer.solar_stabilize

# =============================================================================
# Cable unplugged: Cancel all charging timers to prevent stale state
# =============================================================================
- id: solar_surplus_cable_unplugged_cleanup
  alias: "Solar Surplus - Cable Unplugged Cleanup"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.tesla_ble_charge_flap
      to: "off"
  condition:
    - condition: state
      entity_id: input_boolean.solar_charging_enabled
      state: "on"
  action:
    - service: timer.cancel
      target:
        entity_id: timer.solar_enable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_disable_delay
    - service: timer.cancel
      target:
        entity_id: timer.solar_stabilize
    - service: system_log.write
      data:
        message: >
          Solar charging CLEANUP: cable unplugged, all timers cancelled
        level: info

# =============================================================================
# Cable plugged in while solar mode: Turn off charger to wait for surplus
# =============================================================================
- id: solar_surplus_cable_plugged_guard
  alias: "Solar Surplus - Cable Plugged Guard"
  mode: single
  trigger:
    - platform: state
      entity_id: switch.tesla_ble_charger
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.solar_charging_enabled
      state: "on"
    # Only guard if this was NOT triggered by our own start-charging automation
    - condition: state
      entity_id: timer.solar_guard
      state: "idle"
    # Only guard if surplus is insufficient (allow charging when conditions are met)
    - condition: template
      value_template: "{{ states('sensor.solar_surplus_power') | float(0) < 1200 }}"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.tesla_ble_charger
    - service: timer.start
      target:
        entity_id: timer.solar_guard
    - service: system_log.write
      data:
        message: >
          Solar charging GUARD: charger turned off on cable plug-in,
          waiting for surplus (solar_charging_enabled=on)
        level: info

# =============================================================================
# EP Cube ECHONET Lite Auto-Reload
# If EP Cube sensors stop updating for 4 minutes, reload the integration
# =============================================================================
- id: ep_cube_echonetlite_auto_reload
  alias: "EP Cube - Auto Reload ECHONET Lite"
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/1"
  condition:
    # Reload if any EP Cube sensor is unavailable (ECHONET Lite communication lost)
    - condition: template
      value_template: >
        {% set ep_sensors = [
          states.sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated,
          states.sensor.ep_cube_measured_instantaneous_charging_discharging_electric_energy,
          states.sensor.ep_cube_remaining_stored_electricity_3
        ] %}
        {{ ep_sensors | map(attribute='state')
           | select('eq', 'unavailable') | list | length > 0 }}
  action:
    - service: homeassistant.reload_config_entry
      data:
        entry_id: 01KKVMVSX8ACBB5VP1DC844FXV
    - service: system_log.write
      data:
        message: >
          EP Cube ECHONET Lite auto-reloaded: sensor stale for >4min
          (generation={{ states.sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated.last_updated }},
           charge={{ states.sensor.ep_cube_measured_instantaneous_charging_discharging_electric_energy.last_updated }},
           soc={{ states.sensor.ep_cube_remaining_stored_electricity_3.last_updated }})
        level: warning
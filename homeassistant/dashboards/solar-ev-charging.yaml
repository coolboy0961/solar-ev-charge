# Solar EV Charging Dashboard
# Setup: Settings > Dashboards > Add Dashboard > select "Use YAML"
#        set filename to dashboards/solar-ev-charging.yaml

title: EV
views:
  # ==========================================================================
  # Main View: Overview
  # ==========================================================================
  - title: Overview
    path: overview
    icon: mdi:solar-power
    type: sidebar
    cards:
      # --- Power Flow (real-time with Tesla Model 3) ---
      - type: custom:power-flow-card-plus
        title: Power Flow
        entities:
          solar:
            entity: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
            display_zero_state: true
          grid:
            entity: sensor.smart_meter_power
            color:
              consumption:
                - 100
                - 180
                - 255
              production:
                - 180
                - 130
                - 255
          battery:
            entity: sensor.ep_cube_battery_power_display
            state_of_charge: sensor.ep_cube_remaining_stored_electricity_3
          home:
            entity: sensor.home_consumption_power
            override_state: true
            name: 家
          individual:
            - entity: sensor.tesla_charging_power_w
              name: Tesla
              icon: mdi:car-electric
              display_zero: true
              secondary_info:
                entity: sensor.tesla_ble_charge_level
                unit_of_measurement: "%"
                unit_white_space: false
                decimals: 0
                display_zero: false
        w_decimals: 1

      # --- Energy Flow (daily kWh) ---
      - type: custom:energy-flow-card-plus
        title: Energy Flow
        energy_date_selection: true
        dashboard_link: ""
        entities:
          solar:
            entity: sensor.ep_cube_measured_cumulative_amount_of_electric_energy_generated
            name: 太阳能
            icon: mdi:solar-power
            display_zero_state: true
          grid:
            entity:
              consumption: sensor.smart_meter_cumulative_buy
              production: sensor.smart_meter_cumulative_sell
          battery:
            entity:
              consumption: sensor.ep_cube_ac_measured_cumulative_discharging_electric_energy
              production: sensor.ep_cube_ac_measured_cumulative_charging_electric_energy
            state_of_charge: sensor.ep_cube_remaining_stored_electricity_3
          home:
            override_state: true
          individual1:
            entity: sensor.tesla_ev_charging_energy
            name: Tesla
            icon: mdi:car-electric
            display_zero: true
            display_zero_state: true
            secondary_info:
              entity: sensor.tesla_battery_energy
              decimals: 1
        wh_decimals: 1
        kwh_decimals: 1

      - type: energy-date-selection

      # --- Solar Charging Control (sidebar) ---
      - type: entities
        title: Solar Charging Control
        view_layout:
          position: sidebar
        entities:
          - entity: input_boolean.solar_charging_enabled
            name: Solar Charging
          - entity: binary_sensor.solar_surplus_charging_available
            name: Surplus Available
          - entity: sensor.solar_surplus_power
            name: Surplus Power
          - entity: sensor.solar_total_available_power
            name: Total Available
          - entity: sensor.available_charging_amps
            name: Available Amps

      # --- Power Limit Control (sidebar) ---
      - type: entities
        title: Power Limit
        view_layout:
          position: sidebar
        entities:
          - entity: input_boolean.power_limit_enabled
            name: Power Limit
          - entity: input_number.power_limit_watts
            name: Limit (W)
          - entity: sensor.power_limit_amps
            name: Limit Amps
          - entity: sensor.effective_target_amps
            name: Effective Target

      # --- Tesla Vehicle Status (sidebar) ---
      - type: entities
        title: Tesla Model 3
        view_layout:
          position: sidebar
        entities:
          - entity: sensor.tesla_ble_charge_level
            name: Battery Level
          - entity: sensor.tesla_ble_charging_state
            name: Charging State
          - entity: binary_sensor.tesla_ble_charge_flap
            name: Plugged In
          - entity: sensor.tesla_actual_charging_current
            name: Charging Current (A)
          - entity: sensor.tesla_ble_charge_power
            name: Charging Power (kW)
          - entity: number.tesla_ble_charging_amps
            name: Set Charging Amps
          - entity: number.tesla_ble_charging_limit
            name: Charge Limit
          - entity: switch.tesla_ble_charger
            name: Charging Switch


  # ==========================================================================
  # History View: Graphs
  # ==========================================================================
  - title: History
    path: history
    icon: mdi:chart-line
    type: panel
    cards:
      - type: vertical-stack
        card_mod:
          style: |
            #root {
              padding: 8px;
            }
        cards:
          # --- Power History (today from midnight) ---
          - type: custom:apexcharts-card
            header:
              title: Power Flow (Today)
              show: true
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 280
              legend:
                show: true
              stroke:
                curve: smooth
                width: 1
              fill:
                opacity: 0.4
              tooltip:
                shared: true
            series:
              - entity: sensor.ep_cube_measured_instantaneous_amount_of_electricity_generated
                name: Solar
                type: area
                color: '#c6a033'
                stroke_width: 1
                show:
                  legend_value: false
              - entity: sensor.home_consumption_power
                name: Home
                type: area
                color: '#a58fc2'
                stroke_width: 1
                show:
                  legend_value: false
              - entity: sensor.tesla_charging_power_w
                name: EV Charging
                type: area
                color: '#e07050'
                stroke_width: 1
                show:
                  legend_value: false
              - entity: sensor.smart_meter_power
                name: Grid
                type: area
                color: '#488fc2'
                stroke_width: 1
                show:
                  legend_value: false

          # --- Battery Levels (today from midnight) ---
          - type: custom:apexcharts-card
            header:
              title: Battery Levels (Today)
              show: true
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 200
              legend:
                show: true
              stroke:
                curve: smooth
                width: 1
              fill:
                opacity: 0.4
              tooltip:
                shared: true
            yaxis:
              - min: 0
                max: 100
            series:
              - entity: sensor.tesla_ble_charge_level
                name: Tesla
                type: area
                color: '#e07050'
                stroke_width: 1
                show:
                  legend_value: false
              - entity: sensor.ep_cube_remaining_stored_electricity_3
                name: EP Cube
                type: area
                color: '#488fc2'
                stroke_width: 1
                show:
                  legend_value: false

          # --- Charging Current (today from midnight) ---
          - type: custom:apexcharts-card
            header:
              title: Charging Current (Today)
              show: true
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              stroke:
                curve: smooth
                width: 1
              fill:
                opacity: 0.4
              tooltip:
                shared: true
            yaxis:
              - min: 0
            series:
              - entity: sensor.tesla_actual_charging_current
                name: Actual Current
                type: area
                color: '#e07050'
                stroke_width: 1
                show:
                  legend_value: false
              - entity: sensor.available_charging_amps
                name: Available Amps
                type: area
                color: '#5faf6f'
                stroke_width: 1
                show:
                  legend_value: false
              - entity: sensor.power_limit_amps
                name: Power Limit
                type: line
                color: '#a58fc2'
                stroke_width: 1
                stroke_dash: 4
                show:
                  legend_value: false
              - entity: sensor.effective_target_amps
                name: Target
                type: line
                color: '#c6a033'
                stroke_width: 1
                stroke_dash: 4
                show:
                  legend_value: false

          # --- Device Energy Usage ---
          - type: energy-date-selection
          - type: energy-devices-detail-graph
            title: Device Detail
          - type: energy-devices-graph
            title: Device Total

  # ==========================================================================
  # System View: Diagnostics
  # ==========================================================================
  - title: System
    path: system
    icon: mdi:cog
    cards:
      - type: entities
        title: ESP32 Diagnostics
        entities:
          - entity: sensor.tesla_ble_wifi_signal
            name: WiFi Signal
          - entity: sensor.tesla_ble_uptime
            name: Uptime
          - entity: binary_sensor.tesla_ble_asleep
            name: Vehicle Asleep
          - entity: binary_sensor.tesla_ble_user_presence
            name: User Present
          - entity: sensor.tesla_ble_ble_signal
            name: BLE Signal
          - entity: sensor.tesla_ble_ip_address
            name: IP Address

      - type: entities
        title: Charging Timers
        entities:
          - entity: timer.solar_enable_delay
            name: Enable Delay (1min)
          - entity: timer.solar_disable_delay
            name: Disable Delay (3min)
          - entity: timer.solar_guard
            name: Guard (5min)
          - entity: timer.solar_stabilize
            name: Stabilize (90s)

      - type: entities
        title: Automations
        entities:
          - entity: automation.solar_surplus_adjust_charging_amps
          - entity: automation.solar_surplus_start_charging_enable_delay_expired
          - entity: automation.solar_surplus_stop_charging_disable_delay_expired
          - entity: automation.solar_surplus_stop_on_low_solar_production
          - entity: automation.solar_surplus_stop_on_grid_import
          - entity: automation.solar_surplus_charging_complete
          - entity: automation.solar_surplus_manual_disable
          - entity: automation.solar_surplus_cable_plugged_guard
